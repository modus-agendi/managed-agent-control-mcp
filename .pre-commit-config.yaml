# Run `uv run pre-commit install` once, then hooks run on every commit.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  # Ruff via the project's own environment, so the version always matches
  # pyproject.toml (no separate rev to keep in sync).
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

# Secret scanning also runs in CI (security.yml). Add the gitleaks hook locally
# with `gitleaks` installed if you want pre-commit secret scanning too.
