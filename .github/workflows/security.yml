name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # dependency-review-action only works on public repos (or with GitHub Advanced
    # Security). Gated so it stays green while the repo is private and activates
    # automatically once it goes public.
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5

  # Secret scanning: the gitleaks GitHub Action requires a paid license for
  # organization-owned repos, so it is not run in CI here. Secrets are kept out
  # of the repo via `.gitleaks.toml` + a local pre-commit hook, and GitHub's
  # native secret scanning / push protection can be enabled in repo settings.
  # When the repo is public, gitleaks-action is free and can be re-added.
  #
  # Static security analysis (bandit's checks) runs in CI via Ruff's "S"
  # (flake8-bandit) ruleset — see [tool.ruff.lint] in pyproject.toml.
